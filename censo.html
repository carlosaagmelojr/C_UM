<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Censo Telecom</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1117;--bg2:#161a24;--bg3:#1d2233;--bg4:#242840;
  --accent:#3b82f6;--accent2:#22d3ee;--warn:#f59e0b;--danger:#ef4444;--ok:#22c55e;
  --text:#f0f4ff;--text2:#8b95b0;--text3:#4a5568;
  --border:#2a3050;--border2:#3a4060;--font:system-ui,sans-serif;--mono:monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border)}

/* SCREENS */
.screen{display:none;flex-direction:column;height:100%}
.screen.active{display:flex}

/* LOGIN */
.login-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:12px;overflow-y:auto}
.login-logo{font-size:52px}
.login-title{font-size:26px;font-weight:700;letter-spacing:-.5px}
.login-sub{font-size:14px;color:var(--text2);margin-bottom:8px}
.login-footer{font-size:11px;color:var(--text3);margin-top:12px}
.w100{width:100%;max-width:360px}

/* FORM */
.field-label{display:block;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:5px}
.field-input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.field-input:focus{border-color:var(--accent)}
.field-input::placeholder{color:var(--text3)}
.form-group{margin-bottom:12px;width:100%;max-width:360px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* BUTTONS */
.btn{width:100%;max-width:360px;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px;font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.88}
.btn:active{opacity:.75}
.btn.secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border);font-size:14px;padding:12px}
.btn.danger{background:rgba(239,68,68,.15);color:var(--danger);border:1px solid rgba(239,68,68,.3)}
.btn-sm{background:rgba(59,130,246,.12);color:var(--accent);border:1px solid rgba(59,130,246,.25);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)}
.btn-icon{background:var(--bg3);border:1px solid var(--border);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}

/* STATUS BAR */
.status-bar{background:var(--bg2);display:flex;justify-content:space-between;align-items:center;padding:10px 14px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
.sync-badge{display:flex;align-items:center;gap:5px;border-radius:20px;padding:3px 9px;font-size:11px;font-weight:600;transition:all .4s}
.sync-badge.offline{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:var(--warn)}
.sync-badge.online{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--ok)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.pulse{animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

/* PAGES */
.page{display:none;flex:1;overflow-y:auto;overflow-x:hidden}
.page.active{display:block}
.page::-webkit-scrollbar{width:2px}
.page::-webkit-scrollbar-thumb{background:var(--border2)}

/* NAV */
.bottom-nav{display:flex;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;padding:6px 0}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--text3);font-size:10px;padding:6px 0;transition:color .2s;position:relative}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1}
.nav-badge{position:absolute;top:4px;right:calc(50% - 18px);background:var(--warn);color:#000;border-radius:10px;font-size:9px;font-weight:700;padding:1px 5px}

/* PAGE HEADER */
.page-header{background:var(--bg2);padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5}
.page-header h2{font-size:17px;font-weight:600}
.page-content{padding:14px}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.card-title{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-bottom:10px}
.section-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin:14px 0 8px}

/* STATS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:13px}
.stat-val{font-size:28px;font-weight:600;line-height:1;font-family:var(--mono)}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:4px}
.stat-delta{font-size:11px;margin-top:4px;color:var(--text3)}
.up{color:var(--ok)}.warn-c{color:var(--warn)}

/* ALERTS */
.alert{border-radius:12px;padding:13px;margin-bottom:12px;border:1px solid;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.alert.danger{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3)}
.alert.warning{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.3)}
.alert-title{font-size:13px;font-weight:600;color:var(--danger);margin-bottom:6px}
.alert-body{background:var(--bg3);border-radius:8px;padding:10px;font-size:12px;margin-bottom:10px}
.alert-row{display:flex;justify-content:space-between;padding:2px 0}
.alert-key{color:var(--text2)}.alert-val{font-family:var(--mono)}
.alert-actions{display:flex;gap:8px}
.alert-btn{flex:1;padding:9px;border-radius:8px;border:none;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer}
.alert-btn.primary{background:rgba(59,130,246,.15);color:var(--accent);border:1px solid rgba(59,130,246,.3)}
.alert-btn.ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

/* PROV */
.prov-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.prov-name{font-size:13px;font-weight:500}
.prov-meta{font-size:10px;color:var(--text2)}
.prov-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:2px 4px}

/* POSTE LIST */
.poste-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:8px;cursor:pointer}
.poste-id{font-size:14px;font-weight:600;font-family:var(--mono);color:var(--accent2)}
.poste-addr{font-size:12px;color:var(--text2);margin-top:3px}
.badge{display:inline-block;font-size:10px;font-weight:700;font-family:var(--mono);padding:2px 7px;border-radius:4px}
.badge.ok{background:rgba(34,197,94,.12);color:var(--ok);border:1px solid rgba(34,197,94,.2)}
.badge.warn{background:rgba(245,158,11,.12);color:var(--warn);border:1px solid rgba(245,158,11,.2)}

/* GEO */
.geo-display{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px 13px;display:flex;align-items:center;gap:10px}
.geo-coords{font-family:var(--mono);font-size:12px;color:var(--accent)}

/* MAP */
#map-leaflet{height:calc(100dvh - 140px)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:20px 18px 32px}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:11px 18px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;display:flex;align-items:center;gap:8px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(34,197,94,.4);color:var(--ok)}
.toast.warning{border-color:rgba(245,158,11,.4);color:var(--warn)}
.toast.error{border-color:rgba(239,68,68,.4);color:var(--danger)}

/* RADAR */
.radar{width:110px;height:110px;position:relative;border-radius:50%;border:1.5px solid rgba(59,130,246,.3);margin:10px auto}
.radar-ring{position:absolute;border:1px solid rgba(59,130,246,.12);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}
.radar-sweep{position:absolute;inset:0;border-radius:50%;background:conic-gradient(rgba(59,130,246,.2) 0deg,transparent 60deg,transparent 360deg);animation:sweep 2.5s linear infinite}
@keyframes sweep{to{transform:rotate(360deg)}}
.radar-center{position:absolute;top:50%;left:50%;width:6px;height:6px;background:var(--accent);border-radius:50%;transform:translate(-50%,-50%)}
.radar-blip{position:absolute;width:9px;height:9px;border-radius:50%;background:var(--danger);transform:translate(-50%,-50%);animation:blip 1.2s ease-in-out infinite}
@keyframes blip{0%,100%{opacity:1;transform:translate(-50%,-50%) scale(1)}50%{opacity:.5;transform:translate(-50%,-50%) scale(1.6)}}

.divider{height:1px;background:var(--border);margin:12px 0}
.error-msg{color:var(--danger);font-size:13px;text-align:center;padding:6px}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px 24px;color:var(--text2)}
.empty-icon{font-size:40px;margin-bottom:12px}
select.field-input{cursor:pointer}
</style>
</head>
<body>
<div id="app">
  <!-- LOGIN -->
  <div id="screen-login" class="screen active">
    <div class="login-wrap">
      <div class="login-logo">📡</div>
      <h1 class="login-title">Censo Telecom</h1>
      <p class="login-sub" style="margin-bottom:16px">Levantamento de postes em campo</p>
      <div class="form-group">
        <label class="field-label">E-mail</label>
        <input id="login-email" class="field-input" type="email" placeholder="tecnico@empresa.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="field-label">Senha</label>
        <input id="login-password" class="field-input" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div id="login-error" class="error-msg" style="display:none"></div>
      <button class="btn w100" onclick="doLogin()">Entrar</button>

    </div>

  <!-- APP -->
  <div id="screen-app" class="screen">
    <div class="status-bar">
      <div style="display:flex;align-items:center;gap:8px">
        <span id="status-user" style="font-size:12px;font-weight:600;color:var(--text2)"></span>
        <div class="sync-badge offline" id="syncBadge">
          <div class="sync-dot pulse" id="syncDot"></div>
          <span id="syncText">verificando...</span>
        </div>
      </div>
      <span id="status-time" style="font-size:12px;font-family:var(--mono);color:var(--text3)"></span>
    </div>

    <div id="page-dashboard" class="page active"></div>
    <div id="page-novo-poste" class="page"></div>
    <div id="page-mapa" class="page"></div>
    <div id="page-exportar" class="page"></div>

    <nav class="bottom-nav">
      <div class="nav-item active" id="nav-dashboard" onclick="showPage('dashboard')">
        <span class="nav-icon">🏠</span><span>Início</span>
      </div>
      <div class="nav-item" id="nav-mapa" onclick="showPage('mapa')">
        <span class="nav-icon">🗺️</span><span>Mapa</span>
      </div>
      <div class="nav-item" id="nav-novo-poste" onclick="showPage('novo-poste')" style="position:relative">
        <span class="nav-icon">➕</span><span>Novo</span>
        <div class="nav-badge" id="queueBadge" style="display:none">0</div>
      </div>
      <div class="nav-item" id="nav-exportar" onclick="showPage('exportar')">
        <span class="nav-icon">📤</span><span>Exportar</span>
      </div>
      <div class="nav-item" onclick="doLogout()">
        <span class="nav-icon">🚪</span><span>Sair</span>
      </div>
    </nav>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modal-content"></div>
</div>

<script>
// ============================================================
// CONFIG SUPABASE
// ============================================================
const SB_URL = 'https://zxvcfwpwuglyqagkewn.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4dmtjZndwd3VnbHlxYWdrZXduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMDkyMTQsImV4cCI6MjA5NTU4NTIxNH0.k_gNnBqgvrFTQ4cHvsaIjh_wgTG4M8B50XWJkebK4S0';
let sb = null;
try { sb = window.supabase.createClient(SB_URL, SB_KEY); } catch(e) {}

// ============================================================
// INDEXEDDB
// ============================================================
let db = null;
async function initDB() {
  return new Promise((res) => {
    const req = indexedDB.open('censo_v2', 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('postes')) {
        const s = d.createObjectStore('postes', {keyPath:'id'});
        s.createIndex('synced','synced'); s.createIndex('municipio','municipio');
      }
      if (!d.objectStoreNames.contains('provedores')) {
        const s = d.createObjectStore('provedores', {keyPath:'id'});
        s.createIndex('poste_id','poste_id');
      }
      if (!d.objectStoreNames.contains('queue')) {
        d.createObjectStore('queue', {keyPath:'id',autoIncrement:true});
      }
    };
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror = () => res();
  });
}

function dbAll(store, idx, val) {
  return new Promise(res => {
    if (!db) return res([]);
    try {
      const tx = db.transaction(store,'readonly'), s = tx.objectStore(store);
      const r = idx ? s.index(idx).getAll(val) : s.getAll();
      r.onsuccess = () => res(r.result||[]);
      r.onerror = () => res([]);
    } catch { res([]); }
  });
}
function dbPut(store, data) {
  return new Promise(res => {
    if (!db) return res();
    try {
      const r = db.transaction(store,'readwrite').objectStore(store).put(data);
      r.onsuccess = () => res(r.result);
      r.onerror = () => res();
    } catch { res(); }
  });
}
function dbGet(store, key) {
  return new Promise(res => {
    if (!db) return res(null);
    try {
      const r = db.transaction(store,'readonly').objectStore(store).get(key);
      r.onsuccess = () => res(r.result||null);
      r.onerror = () => res(null);
    } catch { res(null); }
  });
}
function dbDel(store, key) {
  return new Promise(res => {
    if (!db) return res();
    try {
      db.transaction(store,'readwrite').objectStore(store).delete(key).onsuccess = () => res();
    } catch { res(); }
  });
}

// ============================================================
// POSTES
// ============================================================
const Postes = {
  async save(p) {
    if (!p.id) p.id = 'L'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    p.synced = false; p.created_at = p.created_at||new Date().toISOString();
    await dbPut('postes', p);
    await dbPut('queue', {tipo:'poste', ref:p.id, dados:p, ts:Date.now()});
    return p;
  },
  getAll: () => dbAll('postes'),
  getById: id => dbGet('postes', id),
  async markSynced(lid, rid) {
    const p = await dbGet('postes', lid);
    if (p) { p.synced=true; p.remote_id=rid; await dbPut('postes', p); }
  },
  async checkDup(lat, lng, raio=5) {
    const all = await dbAll('postes');
    for (const p of all) {
      if (!p.latitude||!p.longitude) continue;
      const d = calcDist(lat,lng,p.latitude,p.longitude);
      if (d<=raio) return {poste:p, dist:d.toFixed(1)};
    }
    return null;
  }
};

const Provs = {
  async save(p) {
    if (!p.id) p.id = 'P'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    p.synced=false; p.created_at=new Date().toISOString();
    await dbPut('provedores', p);
    await dbPut('queue', {tipo:'provedor', ref:p.id, dados:p, ts:Date.now()});
    return p;
  },
  getByPoste: pid => dbAll('provedores','poste_id',pid),
};

// ============================================================
// SYNC
// ============================================================
let syncOnline = false;
async function updateSyncUI() {
  const q = await dbAll('queue');
  const badge = document.getElementById('syncBadge');
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  const nb = document.getElementById('queueBadge');
  if (!badge) return;
  if (syncOnline && q.length===0) {
    badge.className='sync-badge online'; dot.className='sync-dot'; txt.textContent='online ✓';
  } else if (syncOnline) {
    badge.className='sync-badge online'; dot.className='sync-dot'; txt.textContent=q.length+' pendentes';
  } else {
    badge.className='sync-badge offline'; dot.className='sync-dot pulse'; txt.textContent=q.length>0?q.length+' offline':'sem conexão';
  }
  if (nb) { if (q.length>0){nb.style.display='';nb.textContent=q.length;}else nb.style.display='none'; }
}

async function doSync() {
  const q = await dbAll('queue');
  if (!q.length) { showToast('Nada para sincronizar','warning'); return; }
  if (!sb) { showToast('Banco não configurado','error'); return; }
  
  showToast('Sincronizando...', 'warning');
  let ok=0, erros=[];
  
  for (const item of q) {
    try {
      if (item.tipo==='poste') {
        const d=item.dados;
        const payload = {
          barramento:d.barramento||null,
          latitude:parseFloat(d.latitude)||0,
          longitude:parseFloat(d.longitude)||0,
          logradouro:d.logradouro||null,
          bairro:d.bairro||null,
          municipio:d.municipio||null,
          estado:d.estado||'PE',
          cep:d.cep||null,
          observacoes:d.observacoes||null,
          usuario_email:currentUser?.email||'anonimo',
          usuario_nome:getUserName(),
          created_at:d.created_at||new Date().toISOString()
        };
        const {data,error} = await sb.from('postes').insert(payload).select().single();
        if (error) { erros.push('Poste: '+error.message); }
        else { await Postes.markSynced(d.id, data.id); await dbDel('queue',item.id); ok++; }
      } else if (item.tipo==='provedor') {
        const d=item.dados;
        const poste = await Postes.getById(d.poste_id);
        const payload = {
          poste_id: poste?.remote_id || null,
          nome: d.nome||'Desconhecido',
          tipo: d.tipo||'',
          created_at: d.created_at||new Date().toISOString()
        };
        if (!payload.poste_id) { await dbDel('queue',item.id); ok++; continue; }
        const {error} = await sb.from('provedores').insert(payload);
        if (error) { erros.push('Prov: '+error.message); }
        else { await dbDel('queue',item.id); ok++; }
      }
    } catch(e) { erros.push(e.message||'Erro desconhecido'); }
  }
  
  await updateSyncUI();
  if (ok>0) showToast(ok+' registro(s) sincronizado(s)! ✓','success');
  if (erros.length>0) { console.error('Erros sync:', erros); showToast('Erro: '+erros[0],'error'); }
  if (ok===0 && erros.length===0) showToast('Nada foi enviado','warning');
}

window.addEventListener('online', async () => { syncOnline=true; await updateSyncUI(); doSync(); });
window.addEventListener('offline', () => { syncOnline=false; updateSyncUI(); });

// ============================================================
// GPS
// ============================================================
function calcDist(la1,lo1,la2,lo2) {
  const R=6371000,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function getGPS() {
  return new Promise((res,rej) => {
    if (!navigator.geolocation) return rej(new Error('GPS indisponível'));
    navigator.geolocation.getCurrentPosition(
      p => res({lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy}),
      e => rej(e), {enableHighAccuracy:true,timeout:12000,maximumAge:0}
    );
  });
}
async function reverseGeo(lat,lng) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&addressdetails=1`);
    const d = await r.json();
    return {
      logradouro:(d.address.road||d.address.street||'')+(d.address.house_number?', '+d.address.house_number:''),
      bairro:d.address.suburb||d.address.neighbourhood||'',
      municipio:d.address.city||d.address.town||d.address.village||'',
      estado:d.address.state||'PE', cep:d.address.postcode||''
    };
  } catch { return {logradouro:'',bairro:'',municipio:'',estado:'PE',cep:''}; }
}

let currentUser = null;
function getUserName() {
  if (!currentUser) return 'Técnico';
  return currentUser.user_metadata?.nome || currentUser.email?.split('@')[0] || 'Técnico';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  const btn = document.querySelector('#screen-login .btn');
  if (!email||!pw) { showErr('Preencha e-mail e senha'); return; }
  btn.textContent='Entrando...'; btn.disabled=true; errEl.style.display='none';
  try {
    if (sb) {
      const {data,error} = await sb.auth.signInWithPassword({email,password:pw});
      if (error) throw error;
      currentUser = data.user;
    } else {
      currentUser = {email, user_metadata:{nome:email.split('@')[0]}};
    }
    startApp();
  } catch(e) {
    const msg = e.message||'';
    if (msg.includes('fetch')||msg.includes('network')||msg.includes('Failed')) {
      // Sem rede — entra offline
      currentUser = {email, user_metadata:{nome:email.split('@')[0]}};
      startApp();
      showToast('Modo offline ativo','warning');
    } else {
      showErr('E-mail ou senha incorretos');
    }
  } finally {
    btn.textContent='Entrar'; btn.disabled=false;
  }
}
function showErr(m) {
  const e = document.getElementById('login-error');
  e.textContent=m; e.style.display='block';
}
function doLogout() {
  if (sb) sb.auth.signOut().catch(()=>{});
  currentUser=null;
  document.getElementById('screen-app').style.display='none';
  document.getElementById('screen-login').style.display='flex';
  document.getElementById('login-password').value='';
}

async function startApp() {
  document.getElementById('screen-login').style.display='none';
  document.getElementById('screen-app').style.display='flex';
  document.getElementById('status-user').textContent=getUserName();
  syncOnline = navigator.onLine;
  await updateSyncUI();
  if (syncOnline) setTimeout(doSync, 2000);
  setInterval(() => {
    const el=document.getElementById('status-time');
    if (el) el.textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  },1000);
  renderDashboard();
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  const navEl = document.getElementById('nav-'+name);
  if (navEl) navEl.classList.add('active');
  if (name==='dashboard') renderDashboard();
  else if (name==='novo-poste') renderNovoPoste();
  else if (name==='mapa') renderMapa();
  else if (name==='exportar') renderExportar();
}

function showToast(msg, type='success') {
  const t=document.getElementById('toast');
  const icons={success:'✅',warning:'⚠️',error:'❌'};
  t.innerHTML=(icons[type]||'')+' '+msg;
  t.className='toast show '+type;
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),3200);
}

  try {
    const gps=await getGPS();

    const dup=await Postes.checkDup(gps.lat,gps.lng,5);
    if (dup) renderDupAlert(dup);
    const geo=await reverseGeo(gps.lat,gps.lng);
    disp.innerHTML=`<span style="font-size:20px">✅</span>
      <div style="flex:1"><div class="geo-coords">${gps.lat.toFixed(6)}°, ${gps.lng.toFixed(6)}°</div>
      <div style="font-size:11px;color:var(--text2)">±${Math.round(gps.acc)}m</div></div>
      <button class="btn-sm" onclick="captureGPS()">🔄</button>`;
    if (det) {
      det.style.display='';
      document.getElementById('f-log').value=geo.logradouro;
      document.getElementById('f-bairro').value=geo.bairro;
      document.getElementById('f-mun').value=geo.municipio;
      document.getElementById('f-cep').value=geo.cep;

  } catch {
    disp.innerHTML=`<span style="font-size:20px">⚠️</span>
      <div style="flex:1"><div style="font-size:13px;color:var(--warn)">GPS indisponível</div>

async function exportCSV() {
  const postes=await Postes.getAll();
  if (!postes.length){showToast('Nenhum poste','warning');return;}
  
  // Busca provedores de cada poste
  const rows = [];
  const header = ['ID','Barramento','Latitude','Longitude','Logradouro','Bairro','Municipio','CEP','Estado','Observacoes','Provedor','Tipo_Cabo','Usuario','Data','Sincronizado'];
  rows.push(header.join(';'));
  
  for (const p of postes) {
    const provs = await Provs.getByPoste(p.id);
    if (provs.length === 0) {
      // Poste sem provedor — uma linha
      rows.push([
        p.id||'', p.barramento||'', p.latitude||'', p.longitude||'',
        p.logradouro||'', p.bairro||'', p.municipio||'', p.cep||'', p.estado||'',
        p.observacoes||'', '', '', p.usuario_nome||'', fmtDate(p.created_at), p.synced?'Sim':'Não'
      ].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(';'));
    } else {
      // Uma linha por provedor
      for (const prov of provs) {
        rows.push([
          p.id||'', p.barramento||'', p.latitude||'', p.longitude||'',
          p.logradouro||'', p.bairro||'', p.municipio||'', p.cep||'', p.estado||'',
          p.observacoes||'', prov.nome||'', prov.tipo||'', p.usuario_nome||'', fmtDate(p.created_at), p.synced?'Sim':'Não'
        ].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(';'));
      }
    }
  }
  
  const csv = '\uFEFF' + rows.join('\n'); // BOM para Excel reconhecer UTF-8
  dlFile(`censo_${dtStr()}.csv`,'text/csv;charset=utf-8',csv);
  showToast('CSV baixado com provedores!','success');
}

async function exportKML() {
  const postes=await Postes.getAll();
  if (!postes.length){showToast('Nenhum poste','warning');return;}
  const pm=postes.filter(p=>p.latitude).map(p=>`<Placemark><name>${esc(p.barramento||'Poste')}</name><description>${esc(p.logradouro||'')} · ${esc(p.municipio||'')}</description><Point><coordinates>${p.longitude},${p.latitude},0</coordinates></Point></Placemark>`).join('');
  dlFile(`censo_${dtStr()}.kml`,'application/vnd.google-earth.kml+xml',`<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>Censo ${dtStr()}</name>${pm}</Document></kml>`);
  showToast('KML baixado!','success');
}

function dlFile(name,mime,content) {
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:mime}));
  a.download=name; a.click(); URL.revokeObjectURL(a.href);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function dtStr(){return new Date().toISOString().slice(0,10);}
function fmtDate(iso){if(!iso)return'—';const d=new Date(iso);return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}

document.addEventListener('DOMContentLoaded', async () => {
  await initDB();
  syncOnline = navigator.onLine;
  // Verifica sessão existente
  if (sb) {
    try {
      const {data} = await sb.auth.getSession();
      if (data.session?.user) { currentUser=data.session.user; startApp(); return; }
    } catch {}
  }
  // Mostra login
  document.getElementById('screen-login').style.display='flex';
});
</script>
